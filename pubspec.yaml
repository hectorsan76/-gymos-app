name: gym_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  share_plus: ^7.2.1
  path_provider: 2.1.4
  supabase_flutter: ^2.5.6
  image: ^4.8.0
  mime: ^1.0.6
  path: ^1.9.1
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0
  intl: ^0.20.2
  screenshot: ^3.0.0
  http: ^1.2.0
  url_launcher: ^6.3.2
  mobile_scanner: 3.2.0
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/success.mp3
    - assets/error.mp3

dependency_overrides:
  path_provider_foundation: 2.5.1